# =====================================================
#  docker-compose.yml — Stack MLOps complète
#  Services : postgres + mlflow + api
# =====================================================

services:

  # ---------- 1. Base de données PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: mlops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflowpass}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mlops_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- 2. Serveur MLflow ----------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    container_name: mlops_mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - mlops_net
    # Installe psycopg2 (driver Postgres) puis démarre MLflow
    command: >
      bash -c "pip install --no-cache-dir psycopg2-binary==2.9.10 &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflowpass}@postgres:5432/${POSTGRES_DB:-mlflow}
      --default-artifact-root /mlflow/artifacts"

  # ---------- 3. API FastAPI ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mlops-breast-cancer-api:latest
    container_name: mlops_api
    restart: unless-stopped
    depends_on:
      - mlflow
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_PATH: /app/models/model.pkl
    volumes:
      # Monte le dossier models en lecture seule pour hot-reload du modèle
      - ./models:/app/models:ro
    networks:
      - mlops_net

# ---------- Volumes persistants ----------
volumes:
  postgres_data:
  mlflow_artifacts:

# ---------- Réseau interne ----------
networks:
  mlops_net:
    driver: bridge
